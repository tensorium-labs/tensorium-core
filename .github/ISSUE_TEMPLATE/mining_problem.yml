name: Mining Problem
description: Node not syncing, miner not finding blocks, or wallet balance issues
title: "[Mining] "
labels: ["mining", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for mining and node operation problems.
        Check the [Mining Guide](https://docs.tensoriumlabs.com/mining.html) first.

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      options:
        - Node won't start / crashes
        - Chain stuck / not syncing
        - Miner not finding blocks
        - Mined blocks rejected
        - Wallet balance shows wrong amount
        - P2P connectivity
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.1-testnet
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands you ran
      render: shell

  - type: textarea
    id: output
    attributes:
      label: Output / error messages
      render: shell

  - type: input
    id: height
    attributes:
      label: Current chain height (if applicable)
      description: Output of `curl http://localhost:23332/getblockcount`
