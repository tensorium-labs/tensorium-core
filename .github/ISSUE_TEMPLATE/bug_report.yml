name: Bug Report
description: Report a bug in tensorium-node, txmminer-cuda, txmminer, or txmwallet
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.
        Report issues against the live mainnet-first stack. Include exact runtime context if funds or production hosts are involved.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which binary is affected?
      options:
        - tensorium-node
        - txmminer-cuda (GPU miner)
        - txmminer (CPU dev/diagnostic)
        - txmwallet
        - install.sh
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which release? (e.g. v0.3.1-mainnet-candidate)
      placeholder: v0.3.1-mainnet-candidate
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & Architecture
      description: e.g. Ubuntu 24.04 x86_64
      placeholder: Ubuntu 24.04 LTS x86_64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you did, what you expected, and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands/steps to reproduce the issue.
      placeholder: |
        1. Run `tensorium-node mainnet-candidate init`
        2. Run `tensorium-node mainnet-candidate rpc`
        3. Run `txmminer-cuda 127.0.0.1:33332 txm1...` (or `txmminer` for dev/diagnostic)
        4. See error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages, crash output, or relevant logs.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest release
          required: false
