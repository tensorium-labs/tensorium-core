name: Bug Report
description: Report a bug in tensorium-node, txmminer, or txmwallet
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.
        **Testnet only** — do not report issues related to mainnet or real funds.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which binary is affected?
      options:
        - tensorium-node
        - txmminer
        - txmwallet
        - install.sh
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which release? (e.g. v0.1.1-testnet)
      placeholder: v0.1.1-testnet
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & Architecture
      description: e.g. Ubuntu 24.04 x86_64
      placeholder: Ubuntu 24.04 LTS x86_64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you did, what you expected, and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands/steps to reproduce the issue.
      placeholder: |
        1. Run `tensorium-node init`
        2. Run `tensorium-node rpc`
        3. Run `txmminer 127.0.0.1:23332 txm1...`
        4. See error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages, crash output, or relevant logs.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest release
          required: false
