# Tensorium public RPC nginx template
# Copy to: /etc/nginx/sites-available/<name>
# Then symlink into sites-enabled and adjust hostnames/certs.

limit_req_zone $binary_remote_addr zone=tensorium_rpc_rps:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=tensorium_rpc_conn:10m;

upstream tensorium_mc_rpc {
    server 127.0.0.1:33332;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name mc-rpc.tensoriumlabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mc-rpc.tensoriumlabs.com;

    ssl_certificate /etc/letsencrypt/live/mc-rpc.tensoriumlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mc-rpc.tensoriumlabs.com/privkey.pem;

    access_log /var/log/nginx/tensorium-mc-rpc-access.log;
    error_log /var/log/nginx/tensorium-mc-rpc-error.log warn;

    client_max_body_size 2m;
    keepalive_timeout 15;
    proxy_read_timeout 15s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    if ($request_method !~ ^(GET|POST|OPTIONS)$) {
        return 405;
    }

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=tensorium_rpc_rps burst=20 nodelay;
        limit_conn tensorium_rpc_conn 20;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://tensorium_mc_rpc;
    }
}
